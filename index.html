<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TestFlow — Event Guest Management</title>

<style>
/* ORIGINAL STYLE PRESERVED */
body {
  font-family: 'DM Sans', sans-serif;
  background:#0a0a0f;
  color:#f0eeff;
  margin:0;
}
.app-shell {
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.section {
  background:#111118;
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
}
.btn {
  padding:10px 16px;
  border-radius:10px;
  background:#8b5cf6;
  color:white;
  border:none;
  cursor:pointer;
}
.btn-ghost {
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  color:#ccc;
}
.hidden { display:none !important; }
.event-card {
  background:#16161f;
  padding:14px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="app-shell">

<h2>🎟 GuestFlow</h2>

<!-- EVENTS -->
<div class="section">

<button class="btn-ghost" onclick="toggleCreateEvent()" id="create-event-toggle">
+ New Event
</button>

<div id="create-event-form" class="hidden" style="margin-top:12px;">
  <input id="new-event-name" placeholder="Event Name" style="padding:8px;">
  <button class="btn" onclick="createEvent()">Create</button>
</div>

<div id="events-grid"></div>

</div>

</div>

<script>

// 🔥 HARDWIRED API
let API_URL = "https://script.google.com/macros/s/AKfycbw3yuIKkV3M5H0MUTCjb7BVX0Ym32CvSuKOJf0VKFGXdSldTpXVZxwj_7hPjZOHUxAk/exec";

let events = [];
let selectedEventId = null;

// ── API ──
async function apiGet(action, params = {}) {
  const query = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${API_URL}?${query}`);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(body)
  });
  return res.json();
}

// ── FIXED TOGGLE ──
function toggleCreateEvent(){
  const form = document.getElementById("create-event-form");
  const btn = document.getElementById("create-event-toggle");

  const isHidden = form.classList.contains("hidden");

  if(isHidden){
    form.classList.remove("hidden");
    btn.textContent = "Cancel";
  } else {
    form.classList.add("hidden");
    btn.textContent = "+ New Event";
  }
}

// ── CREATE EVENT ──
async function createEvent(){
  const name = document.getElementById("new-event-name").value.trim();
  if(!name) return;

  await apiPost({
    action:"createEvent",
    eventName:name
  });

  document.getElementById("new-event-name").value = "";

  await loadEvents();
}

// ── LOAD EVENTS ──
async function loadEvents(){
  const res = await apiGet("getEvents");
  events = res.events || [];
  renderEvents();
}

// ── RENDER EVENTS ──
function renderEvents(){
  const grid = document.getElementById("events-grid");
  grid.innerHTML = "";

  if(events.length === 0){
    grid.innerHTML = "<p>No events yet</p>";
    return;
  }

  events.forEach(e=>{
    const div = document.createElement("div");
    div.className = "event-card";
    div.innerHTML = `<strong>${e.eventName}</strong>`;
    div.onclick = () => selectEvent(e.eventId);
    grid.appendChild(div);
  });
}

// ── SELECT EVENT ──
function selectEvent(eventId){
  selectedEventId = eventId;
  console.log("Selected:", eventId);
}

// ── AUTO SYNC ──
setInterval(()=>{
  if(selectedEventId){
    loadEvents();
  }
},5000);

// ── INIT ──
window.onload = ()=>{
  loadEvents();
};

</script>

</body>
</html>
