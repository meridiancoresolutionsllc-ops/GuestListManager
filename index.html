<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuestFlow — Event Guest Management</title>

<style>
/* KEEPING USER DESIGN CORE */
body { background:#0a0a0f; color:#f0eeff; font-family: 'DM Sans', sans-serif; }
.hidden { display:none !important; }
.app-shell { max-width:1100px; margin:auto; padding:20px; }
.btn { cursor:pointer; padding:10px 16px; border-radius:8px; background:#8b5cf6; color:white; border:none; }
.btn-ghost { background:transparent; border:1px solid #333; color:#ccc; }
.section { background:#111118; padding:20px; margin-bottom:20px; border-radius:12px; }
</style>

</head>
<body>

<div class="app-shell">

<h2>🎟 GuestFlow</h2>

<!-- EVENTS -->
<div class="section">
  <button class="btn-ghost" onclick="toggleCreateEvent()" id="create-event-toggle">+ New Event</button>

  <div id="create-event-form" class="hidden" style="margin-top:10px;">
    <input id="new-event-name" placeholder="Event Name"/>
    <button class="btn" onclick="createEvent()">Create</button>
  </div>

  <div id="events-grid"></div>
</div>

</div>

<script>

// 🔥 HARDCODED API
let API_URL = "https://script.google.com/macros/s/AKfycbw3yuIKkV3M5H0MUTCjb7BVX0Ym32CvSuKOJf0VKFGXdSldTpXVZxwj_7hPjZOHUxAk/exec";

let events = [];
let selectedEventId = null;

// ── API ──
async function apiGet(action, params = {}) {
  const query = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch(`${API_URL}?${query}`);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(body)
  });
  return res.json();
}

// ── FIXED TOGGLE ──
function toggleCreateEvent(){
  const form = document.getElementById("create-event-form");
  const btn = document.getElementById("create-event-toggle");

  const isHidden = form.classList.contains("hidden");

  if(isHidden){
    form.classList.remove("hidden");
    btn.textContent = "Cancel";
  } else {
    form.classList.add("hidden");
    btn.textContent = "+ New Event";
  }
}

// ── CREATE EVENT ──
async function createEvent(){
  const name = document.getElementById("new-event-name").value.trim();
  if(!name) return;

  await apiPost({
    action:"createEvent",
    eventName:name
  });

  document.getElementById("new-event-name").value = "";

  await loadEvents();
}

// ── LOAD EVENTS ──
async function loadEvents(){
  const res = await apiGet("getEvents");
  events = res.events || [];
  renderEvents();
}

// ── RENDER EVENTS ──
function renderEvents(){
  const grid = document.getElementById("events-grid");
  grid.innerHTML = "";

  if(events.length === 0){
    grid.innerHTML = "<p>No events yet</p>";
    return;
  }

  events.forEach(e=>{
    const div = document.createElement("div");
    div.style.padding = "12px";
    div.style.marginTop = "10px";
    div.style.border = "1px solid #333";
    div.style.borderRadius = "8px";
    div.style.cursor = "pointer";

    div.innerHTML = `<strong>${e.eventName}</strong>`;

    div.onclick = () => selectEvent(e.eventId);

    grid.appendChild(div);
  });
}

// ── SELECT EVENT ──
function selectEvent(eventId){
  selectedEventId = eventId;
}

// ── AUTO SYNC ──
setInterval(()=>{
  if(selectedEventId){
    loadEvents();
  }
},5000);

// ── INIT ──
window.onload = ()=>{
  loadEvents();
};

</script>

</body>
</html>
